# Built-in model aliases. Users can add more in .meridian/models.toml.
#
# Example user alias:
#   [aliases]
#   fast = "claude-sonnet-4-6"

[aliases]
opus = "claude-opus-4-6"
sonnet = "claude-sonnet-4-6"
codex = "gpt-5.3-codex"

[metadata.opus]
role = "Default / all-rounder"
strengths = "Best primary agent brain"
cost_tier = "$$$"

[metadata.sonnet]
role = "Fast generalist"
strengths = "UI iteration and fast implementation"
cost_tier = "$$"

[metadata.codex]
role = "Executor / correctness"
strengths = "Repo implementation and correctness passes"
cost_tier = "$"
